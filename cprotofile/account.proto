syntax = "proto3";

import "google/protobuf/any.proto";

package cproto;
option go_package = "../cproto";

message AccountReq {
  google.protobuf.Any req = 1;
}

message AccountAck {
  google.protobuf.Any ack = 1;
}

message WxLoginReq {
  string code = 1; //微信码
  string invite_code = 2; //邀请码
}

message WxLoginAck {
  string session_key = 1;
  PlayerInfoAck player_info = 2;
}

message UpdateAccountReq {
  string nickname = 1;
  string avatar = 2;
}

message LoginReq {
  string account = 1;
  string password = 2;
}

message RegisterReq {
  string account = 1; 
  string password = 2;
  string avatar = 3; //随机生成的头像内容
  string invite_code = 4; //邀请码
}

message BindInviteCodeReq {
  string invite_code = 1;
}

message ShopReq{
  int32 shop_type = 1; // 商店类型 0:金币商店 1:元宝商店
}

message BackpackReq {  
}

message BackpackAck {
  map<int32, int64> items = 1; //玩家物品
}

message ShopAck{
  int32 shop_type = 1;
  string shop_info = 2; // 商店数据，json格式
}

message PurchaseReq {
  int32 shop_type = 1; // 0:金币商店 1:元宝商店
  int32 id = 2;  //商品id
  bool to_coin = 3; //自动兑换成金币
}

message PurchaseAck {
  int32 shop_type = 1;
  map<int32, int64> goods = 2; // 商品id和数量
} 

message RegisterAck {  
  PlayerInfoAck player_info = 1; // 新注册玩家的信息
  map<int32,int64> award = 2; // 新注册玩家的奖励
}

message PlayerInfoAck {
  string uid = 1; // 玩家ID
  string nickname = 2; // 玩家昵称
  string avatar = 3; // 玩家头像
  map<int32, int64> items = 4; //玩家物品
}

message ItemsAck {
  map<int32, int64> items = 1; //玩家物品
}

// 会员相关协议
message MemberInfoReq {
  // 空请求，获取当前会员信息
}

message MemberInfoAck {
  int32 type = 1; // 会员类型：0-无会员，1-月卡，2-季卡，3-年卡
  int64 expire_time = 2; // 过期时间（时间戳，0表示无会员）
  repeated MemberTypeInfo types = 3; // 所有会员类型信息（包含价格、奖励等）
}

message MemberTypeInfo {
  int32 type = 1; // 会员类型：1-月卡，2-季卡，3-年卡
  int32 price = 2; // 开通价格（元）
  map<int32, int64> purchase_bonus = 3; // 立即奖励
  map<int32, int64> daily_reward = 4; // 每日奖励
}

message BuyMemberReq {
  int32 type = 1; // 会员类型：1-月卡，2-季卡，3-年卡
}

message BuyMemberAck {
  int32 type = 1; // 会员类型
  int64 expire_time = 2; // 过期时间（时间戳）
  map<int32, int64> bonus = 3; // 购买时获得的奖励
}

message ExchangeRateReq {
  int32 fromid = 1; // 原物品id
  int32 toid = 2; // 新物品id
}

message ExchangeRateAck{
  int32 fromid = 1; // 原物品id
  int32 toid = 2; // 新物品id
  int32 base = 3; //基础兑换值
  int32 bonus = 4; // 加成值,计算时向下整成 result= n *base*(100+ bonus)/100
}

message ExchangeReq {
  int32 fromid = 1; // 原物品id
  int32 toid = 2; // 新物品id
  int64 count = 3; // 原物品数量
}

message ExchangeAck {
  map<int32, int64> items = 1; // 新物品id和数量
}

// 实物兑换订单 st: 0待发货 1已发货 2已完成 3已取消
message PhysOrdBrief {
  uint64 id = 1;
  int32 status = 2;   // 订单状态：0待发货 1已发货 2已完成 3已取消
  int64 created_ts = 3; // 创建时间 unix 秒
  map<int32, int64> items = 4; // 兑换出的物品id和数量
}

message PhysOrdSubmitReq {
  map<int32, int64> items = 1;     // 兑换出的物品id和数量
  string recv_name = 2;
  string phone = 3;
  string addr = 4;                 // 收货地址（合并省市区+详细地址）
  string remark = 5;              // 备注/留言（可选，可输入更详细信息）
}

message PhysOrdSubmitAck {
  uint64 id = 1;
  int32 st = 2;
}

message PhysOrdListReq {
  int32 page = 1;
  int32 size = 2;
}

message PhysOrdListAck {
  repeated PhysOrdBrief rows = 1;
  int32 total = 2;
}

message PhysOrdGetReq {
  uint64 id = 1;
}

message PhysOrdGetAck {
  PhysOrdBrief base = 1;
  string recv_name = 2;
  string phone = 3;
  string addr = 4;
  string remark = 5;
  string expr_corp = 6; // 快递公司/承运商（仅已发货后有值）
  string expr_no = 7;   // 快递单号（仅已发货后有值）
  int64 up_ts = 8;
}

// 虚拟兑换订单（话费/京东卡）st: 0待处理 2已完成 3已取消
// - 兑换提交后由运营人员手动发奖（如充值/发放卡密），然后将订单置为已完成。
message VirtOrdBrief {
  uint64 id = 1;
  int32 status = 2;       // 0待处理 2已完成 3已取消
  int64 created_ts = 3;   // 创建时间 unix 秒
  map<int32, int64> items = 4; // 扣减物品快照（可由 itemID 推断话费/京东卡）
  string phone = 5;       // 充值手机号
}

message VirtOrdSubmitReq {
  map<int32, int64> items = 1;  // 扣减物品（道具）及数量（通过 itemID 推断话费/京东卡）
  string phone = 2;             // 充值手机号（运营发奖依据）
  string remark = 3;            // 备注（可选）
}

message VirtOrdSubmitAck {
  uint64 id = 1;
  int32 st = 2;
}

message VirtOrdListReq {
  int32 page = 1;
  int32 size = 2;
}

message VirtOrdListAck {
  repeated VirtOrdBrief rows = 1;
  int32 total = 2;
}