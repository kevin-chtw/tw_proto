syntax = "proto3";

package cproto;
option go_package = "../cproto";

message ErrorAck {
  int32 code = 1;
  string message = 2;
  string detail = 3;
}

message NeedPayAck {
  string server_type = 1;
  string server_id = 2;
  uint64 session_id = 3;
  int32 price = 4;
  string product_id = 5; // 渠道商品ID: sycee_{id}_{price} / member_{type}_{price} / act_{type}_{pkg}_{price}
}