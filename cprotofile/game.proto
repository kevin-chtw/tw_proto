syntax = "proto3";

import "google/protobuf/any.proto";

package cproto;
option go_package = "../cproto";

message GameReq {
  string serverid = 1;
  int32 matchid = 2; // 比赛ID
  int32 tableid = 3; // 桌号
  google.protobuf.Any req = 4;
}

message GameAck {
  string serverid = 1;
  int32 matchid = 2; // 比赛ID
  int32 tableid = 3; // 桌号
  google.protobuf.Any ack = 4;
}

message EnterGameReq {  
}

message GameReadyReq {
  bool ready = 1; // 是否准备
}

//解散请求
message GameDissolveReq {
  bool agree = 1; //是否同意解散
}

// 表情发送请求：to_seat = -1 表示发给自己；否则表示发给其他玩家（seat 仅用于客户端表现层）
message EmoteSendReq {
  int32 emote_id = 1; // 表情ID
  int32 to_seat = 2; // 目标座位(-1=self)
}

message EnterGameAck {
  int32 tableid = 1; // 桌号
  int64 score_base = 2; // 分数基数
  int64 tax = 3; // 服务费
  int32 game_count = 4; // 游戏局数  
  int32 cur_game_count = 5; // 当前游戏局数
  int32 player_count = 6; // 玩家数量
  string property = 7; // 游戏配置
  string creator = 8; // 创建者
  string desn = 9; // 游戏描述
  map<string,int32> fdproperty = 10; // 好友房自选配置
  bytes emote_conf = 11; // 表情配置(JSON快照，按match下发)
}

// 表情广播：不写入历史消息，断线重连不补发
message EmoteAck {
  int32 emote_id = 1;   // 表情ID
  int32 from_seat = 2;  // 发送方座位
  int32 to_seat = 3;    // 目标座位(-1=self)
}

message TablePlayerAck {
  string uid = 1; // 玩家ID
  string nickname = 2; // 玩家昵称
  string avatar = 3; // 玩家头像
  int32 seat = 4; // 座位号
  bool ready = 5; // 是否准备
  map<int32,int64> items = 6; //物品数量
}

message TableMsgReq {  
  bytes msg = 1; // 消息内容
}

message TableMsgAck {
  bytes msg = 1; // 消息内容
}

message GameExitAck {
  string uid = 1; //玩家ID
}

message GameReadyAck {
  int32 seat = 1; // 座位号
  bool ready = 2; // 是否准备
}

message GameDissolveAck {
  int64 starttime = 1; // 解散发起时间
  int64 endtime = 2; // 解散结束时间
  int32 seat = 3; // 座位号
  map<int32,bool> agreed = 4; // 是否同意解散
}

message GameDissolveResultAck{
  bool dissovle = 1; //解散确认 
}

// 单局游戏开始
message GameBeginAck {
  int32 cur_game_count = 1; // 当前游戏局数
}

// 单局游戏结束
message GameOverAck {
  int32 cur_game_count = 1; // 当前游戏局数
  repeated bool ready = 2; // 玩家准备状态
}

// 历史消息开始
message HisBeginAck {
}

// 历史消息结束
message HisEndAck {
}