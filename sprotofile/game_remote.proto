syntax = "proto3";

import "google/protobuf/any.proto";

package sproto;
option go_package = "../sproto";

message GameReq {
  int32 matchid = 1;
  int32 tableid = 2;
  google.protobuf.Any req = 3; // 请求内容
}

message GameAck {
  int32 matchid = 1;
  int32 tableid = 2;
  google.protobuf.Any ack = 3; // 响应内容
}

message AddTableReq {  
  string match_type = 1; // 比赛服务类型
  int32 game_count = 2; // 游戏局数
  int32 player_count = 3; // 玩家数量  
  string property = 4; // 游戏配置
  string creator = 5; // 创建者
  string desn = 6; // 游戏描述
  map<string,int32> fdproperty = 7; // 好友房自选配置
  bytes emote_conf = 8; // 表情配置(JSON快照，按match下发)
}

message AddPlayerReq {
  string playerid = 1; // 玩家ID
  bool bot = 2; // 是否为机器人
  int32 seat = 3; // 座位号
  int64 score = 4; // 玩家分数
  string nickname = 5; // 玩家昵称
  string avatar = 6; // 玩家头像
  map<int32, int64> items = 7; //玩家物品
  int32 ctrl = 8;      // 0-不控制 1-赢分 2-输分，新手保护期真人传1
  int32 bot_level = 9; // 机器人等级 0-正常 1-低智能 2-弱智
  int64 score_base = 10; //玩家档位基数
  int64 tax = 11; //玩家桌费
  int64 exchange_rate = 12; //兑换比例
  int32 matchid = 13; //玩家的matchid
  map<int32, int32> equipped = 14; // 当前穿戴(key=category 1~5, value=deco_id)，已做失效回退
}

message CancelTableReq {
  int32 reason = 1; // 取消原因
} 

message EmptyAck {}

message ExitTableReq {
  string playerid = 1; // 玩家ID
  bool fause = 2; // 是否强制退出
}

message ExitTableAck {
  string playerid = 1; // 玩家ID
  int64 score = 2; // 玩家分数
}
