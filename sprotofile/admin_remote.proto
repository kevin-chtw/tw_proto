syntax = "proto3";

package sproto;
option go_package = "../sproto";

// Admin remotes (matchcfg/signcfg) messages.

// MatchCfg service (admin.matchcfg.*) messages.
message MatchCfgVersionReq {
  string server_type = 1; // island/fdtable/schedule/wheel, empty means all
}

message MatchCfgVersionAck {
  uint64 version = 1; // max(version) within scope
}

message MatchCfgRow {
  string server_type = 1;
  int32 match_id = 2;
  string name = 3;
  string content = 4; // YAML
  uint64 version = 5;
  string game_type = 6;
  string placement_ips = 7; // JSON array string, e.g. ["10.0.1.3","10.0.1.4"]
}

message MatchCfgListReq {
  string server_type = 1; // required
}

message MatchCfgListAck {
  repeated MatchCfgRow rows = 1;
}

message MatchCfgGetReq {
  string server_type = 1;
  int32 match_id = 2;
}

message MatchCfgGetAck {
  MatchCfgRow row = 1;
}

// SignCfg service (admin.signcfg.*) messages.
message SignCfgVersionReq {
  uint64 dummy = 1;
}

message SignCfgVersionAck {
  uint64 version = 1; // max(version) within sign_cfg scope
}

message SignCfgRow {
  int32 match_id = 1;
  string content = 2; // YAML
  uint64 version = 3;
}

message SignCfgListReq {
  uint64 dummy = 1;
}

message SignCfgListAck {
  repeated SignCfgRow rows = 1;
}

message SignCfgGetReq {
  int32 match_id = 1;
}

message SignCfgGetAck {
  SignCfgRow row = 1;
}

