syntax = "proto3";

package sproto;
option go_package = "../sproto";

// Admin remotes (matchcfg/signcfg/bonuscfg/decocfg) messages.

// MatchCfg service (admin.matchcfg.*) messages.
message MatchCfgVersionReq {
  string server_type = 1; // island/fdtable/schedule/wheel, empty means all
}

message MatchCfgVersionAck {
  uint64 version = 1; // max(version) within scope
}

message MatchCfgRow {
  string server_type = 1;
  int32 match_id = 2;
  string name = 3;
  string content = 4; // YAML
  uint64 version = 5;
  string game_type = 6;
  string placement_ips = 7; // JSON array string, e.g. ["10.0.1.3","10.0.1.4"]
}

message MatchCfgListReq {
  string server_type = 1; // required
}

message MatchCfgListAck {
  repeated MatchCfgRow rows = 1;
}

message MatchCfgGetReq {
  string server_type = 1;
  int32 match_id = 2;
}

message MatchCfgGetAck {
  MatchCfgRow row = 1;
}

// SignCfg service (admin.signcfg.*) messages.
message SignCfgVersionReq {
  uint64 dummy = 1;
}

message SignCfgVersionAck {
  uint64 version = 1; // max(version) within sign_cfg scope
}

message SignCfgRow {
  int32 match_id = 1;
  string content = 2; // YAML
  uint64 version = 3;
}

message SignCfgListReq {
  uint64 dummy = 1;
}

message SignCfgListAck {
  repeated SignCfgRow rows = 1;
}

message SignCfgGetReq {
  int32 match_id = 1;
}

message SignCfgGetAck {
  SignCfgRow row = 1;
}

// BonusCfg service (admin.bonuscfg.*) — 数据存 match_cfg.server_type = bonus
message BonusCfgVersionReq {
  uint64 dummy = 1;
}

message BonusCfgVersionAck {
  uint64 version = 1;
}

message BonusCfgRow {
  int32 match_id = 1;
  string name = 2;
  string content = 3; // YAML
  uint64 version = 4;
}

message BonusCfgListReq {
  uint64 dummy = 1;
}

message BonusCfgListAck {
  repeated BonusCfgRow rows = 1;
}

message BonusCfgGetReq {
  int32 match_id = 1;
}

message BonusCfgGetAck {
  BonusCfgRow row = 1;
}

// DecoCfg service (admin.decocfg.*) messages.
message DecoCfgVersionReq {
  uint64 dummy = 1;
}

message DecoCfgVersionAck {
  uint64 version = 1;
}

message DecoCfgRow {
  int32 deco_id = 1;
  string name = 2;
  int32 category = 3;       // 1=头像框 2=麻将牌桌 3=麻将牌背 4=扑克牌桌 5=扑克牌背
  int32 status = 4;         // 0=禁用 1=启用
  bool is_default = 5;
  int32 sort = 6;
  string icon = 7;
  string preview_asset = 8;
  string acquire_desc = 9;
  string content = 10;      // 扩展 JSON（资源包、动画参数等）
  uint64 version = 11;
}

message DecoCfgListReq {
  uint64 dummy = 1;
}

message DecoCfgListAck {
  repeated DecoCfgRow rows = 1;
}

message DecoCfgGetReq {
  int32 deco_id = 1;
  int32 category = 2; // 1=头像框 2=麻将牌桌 3=麻将牌背 4=扑克牌桌 5=扑克牌背
}

message DecoCfgGetAck {
  DecoCfgRow row = 1;
}
