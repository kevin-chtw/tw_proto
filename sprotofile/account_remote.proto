syntax = "proto3";

import "google/protobuf/any.proto";

package sproto;
option go_package = "../sproto";

message AccountReq {
  bool bot = 1; //是否为机器人
  google.protobuf.Any req = 2; // 请求内容
}

message AccountAck {
  bool bot = 1; //是否为机器人
  google.protobuf.Any ack = 2; // 响应内容
}

message GetBotReq{
}

message GetBotAck{
  string uid = 1; //机器人id
  int64 expired = 2; //过期时间
}

message PlayerInfoReq {
  string uid = 1; //用户id
}

message PlayerInfoAck {
  string uid = 1; // 玩家ID
  string nickname = 2; // 玩家昵称
  string avatar = 3; // 玩家头像
  map<int32, int64> items = 4; //玩家物品
}

message ChangeItemsReq {
    string uid = 1; //用户id
    map<int32, int64> items = 2; //玩家物品
}

message ChangeItemsAck {
    string uid = 1; //用于id
    map<int32, int64> items = 2; //玩家物品
}

// 新手保护统计
message GetNewbieStatsReq {
  string uid = 1;
}

message GetNewbieStatsAck {
  int32 match_count = 1;      // lifetime总对局数
  int32 pressure = 2;         // 压力值(连输数)
  int32 protected_count = 3;  // 已消耗的新手保护局数
}

message UpdateNewbieStatsReq {
  string uid = 1;
  bool win = 2;              // 本局是否赢
  bool in_protected_room = 3; // 是否在新手/初级场保护局内
}

message UpdateNewbieStatsAck {
}

// 运营发货/改状态 st: 1已发货(需expr) 2已完成 3已取消
message PhysOrdShipReq {
  uint64 id = 1;
  int32 st = 2;
  string expr_corp = 3;
  string expr_no = 4;
}

message PhysOrdShipAck {
}

// 运营后台：查询实物兑换订单（可用于待发货列表）
// status:
// - 0 待发货
// - 1 已发货
// - 2 已完成
// - 3 已取消
// - -1 查询全部
message PhysOrdAdminListReq {
  int32 status = 1;
  int32 page = 2;
  int32 size = 3;
}

message PhysOrdAdminRow {
  uint64 id = 1;
  string uid = 2;
  int32 status = 3;
  int64 created_ts = 4;
  map<int32, int64> items = 5;
  string recv_name = 6;
  string phone = 7;
  string addr = 8;
  string remark = 9;
  string expr_corp = 10;
  string expr_no = 11;
  int64 up_ts = 12;
}

message PhysOrdAdminListAck {
  repeated PhysOrdAdminRow rows = 1;
  int32 total = 2;
}

// 运营后台：查询虚拟兑换订单（话费/京东卡）
// status:
// - 0 待处理
// - 2 已完成
// - 3 已取消
// - -1 查询全部
message VirtOrdAdminListReq {
  int32 status = 1;
  int32 page = 2;
  int32 size = 3;
}

message VirtOrdAdminRow {
  uint64 id = 1;
  string uid = 2;
  int32 status = 3;
  int64 created_ts = 4;
  map<int32, int64> items = 5;
  string phone = 6;
  string remark = 7;
  int64 up_ts = 8;
}

message VirtOrdAdminListAck {
  repeated VirtOrdAdminRow rows = 1;
  int32 total = 2;
}

// 运营改状态（内部 RPC）：待处理 -> 已完成/已取消
message VirtOrdMarkReq {
  uint64 id = 1;
  int32 st = 2; // 2已完成 3已取消
}

message VirtOrdMarkAck {
}
